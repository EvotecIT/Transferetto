name: Test PowerShell

on:
    push:
        branches:
            - master
        paths-ignore:
            - '*.md'
            - 'Docs/**'
            - 'Examples/**'
            - 'Website/**'
            - '.gitignore'
    pull_request:
        branches:
            - master
    workflow_dispatch:
        inputs:
            run_live_ftp_tests:
                description: Run live external FTP/FTPS integration tests
                required: false
                default: false
                type: boolean

permissions:
    contents: read

env:
    DOTNET_VERSION: '10.x'
    BUILD_CONFIGURATION: Debug
    TRANSFERETTO_RUN_LIVE_FTP_TESTS: ${{ github.event_name == 'workflow_dispatch' && inputs.run_live_ftp_tests == true && '1' || '0' }}

jobs:
    test-windows-ps5:
        name: Windows PowerShell 5.1
        runs-on: windows-latest
        timeout-minutes: 15
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Build .NET solution
              run: |
                  dotnet restore Transferetto.sln
                  dotnet build Transferetto.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

            - name: Run PowerShell tests
              shell: powershell
              run: ./Transferetto.Tests.ps1

    test-windows-ps7:
        name: Windows PowerShell 7
        runs-on: windows-latest
        timeout-minutes: 15
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Build .NET solution
              run: |
                  dotnet restore Transferetto.sln
                  dotnet build Transferetto.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

            - name: Run PowerShell tests
              shell: pwsh
              run: ./Transferetto.Tests.ps1

    test-ubuntu:
        name: Ubuntu PowerShell 7
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Install PowerShell
              run: |
                  if command -v pwsh >/dev/null 2>&1; then
                    pwsh --version
                    exit 0
                  fi

                  curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
                  curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/microsoft.list
                  sudo apt-get update
                  sudo apt-get install -y powershell

            - name: Build .NET solution
              run: |
                  dotnet restore Transferetto.sln
                  dotnet build Transferetto.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

            - name: Run PowerShell tests
              shell: pwsh
              run: ./Transferetto.Tests.ps1

    test-macos:
        name: macOS PowerShell 7
        runs-on: macos-latest
        timeout-minutes: 15
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Install PowerShell
              shell: bash
              run: |
                  if command -v pwsh >/dev/null 2>&1; then
                    pwsh --version
                    exit 0
                  fi

                  brew update
                  brew tap powershell/tap
                  brew install --cask powershell || brew install powershell/tap/powershell

            - name: Build .NET solution
              run: |
                  dotnet restore Transferetto.sln
                  dotnet build Transferetto.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

            - name: Run PowerShell tests
              shell: pwsh
              run: ./Transferetto.Tests.ps1
